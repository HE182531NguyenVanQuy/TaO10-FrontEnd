@if (noticeVisible) {
  <div class="notice-bar" role="banner">
    📣 Kỳ thi tuyển sinh vào lớp 10 năm 2026 sắp diễn ra! &nbsp;
    <a routerLink="/">Xem lịch thi ngay →</a>
    <button type="button" class="notice-close" (click)="closeNotice()" aria-label="Đóng">✕</button>
  </div>
}

<div class="topbar">
  <div class="topbar-left">
    <span>📞 Hỗ trợ: 1900-0000</span>
    <span>✉️ <a href="mailto:tao10&#64;gmail.com">tao10&#64;gmail.com</a></span>
  </div>
  <div>
    <a routerLink="/about">Về chúng tôi</a>
    <a routerLink="/contact">Liên hệ</a>
    <a routerLink="/news">Tin tức</a>
    <a routerLink="/faq">FAQ</a>
  </div>
</div>

<header>
  <div class="header-inner">
    <a routerLink="/" class="logo">
      <div class="logo-icon">📚</div>
      <div class="logo-text">
        <span>TaO</span><span>10</span>
      </div>
    </a>
    <nav>
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Trang chủ</a>
      <a routerLink="/de-thi" routerLinkActive="active">Đề thi</a>
      <a routerLink="/test" routerLinkActive="active">Thi thử</a>
      <a routerLink="/ngu-phap" routerLinkActive="active">Ngữ pháp</a>
      <a routerLink="/tu-vung" routerLinkActive="active">Từ vựng</a>
      <a routerLink="/tai-lieu" routerLinkActive="active">Tài liệu</a>
      <a routerLink="/dien-dan" routerLinkActive="active">Diễn đàn</a>
    </nav>
    <div class="header-actions">
      <button type="button" class="btn-login" routerLink="/login">Đăng nhập</button>
      <a routerLink="/register" class="btn-register">🚀 Đăng ký miễn phí</a>
      <div class="hamburger" role="button" tabindex="0" aria-label="Menu">☰</div>
    </div>
  </div>
</header>

<section class="search-section">
  <div class="search-wrap">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input
        type="text"
        id="searchInput"
        placeholder="Tìm đề thi, chủ đề, từ vựng, ngữ pháp..."
        aria-label="Tìm kiếm"
      />
    </div>
    <select class="search-filter" aria-label="Lọc tìm kiếm">
      <option>Tất cả</option>
      <option>Đề thi</option>
      <option>Ngữ pháp</option>
      <option>Từ vựng</option>
      <option>Tài liệu</option>
    </select>
    <button type="button" class="btn-search">Tìm kiếm</button>
  </div>
</section>
